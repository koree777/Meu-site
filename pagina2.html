<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <a href="index.html">Página Principal</a>
     <!-- Produtos -->
    <section class="section">
        <div class="container">

            <div class="section-header">
                <div>
                    <h2 class="section-header__title">
                        Produtos em Destaque
                    </h2>

                    <p class="section-header__sub">
                        Os mais vendidos da semana
                    </p>
                </div>

                <div class="search-field">
                    <span class="search-field__icon">🔍</span>
                    <input type="text" placeholder="Buscar produtos...">
                </div>
            </div>

            <div class="filter-bar">
                <button class="filter-pill active">Todos</button>
                <button class="filter-pill">Torneiras</button>
                <button class="filter-pill">Adaptadores</button>
                <button class="filter-pill">Incêndio</button>
                <button class="filter-pill">Promoções</button>
            </div>

            <div class="products-grid">

                <!-- Produto 1 -->
                <div class="product-card">

                    <div class="product-card__image">

                        <img src="https://http2.mlstatic.com/D_NQ_NP_2X_873852-MLA105487889350_012026-F.webp" alt="Produto">

                        <div class="product-card__badges">
                            <span class="badge badge--new">
                                Novo
                            </span>
                        </div>

                        <button class="product-card__wishlist">
                            ❤️
                        </button>

                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Incêndio
                        </div>

                        <h3 class="product-card__name">
                            Botoeira De Alarme De Bomba
                        </h3>

                        <div class="rating">
                            <span class="rating__stars">★★★★★</span>
                            <span class="rating__count">(129)</span>
                        </div>

                        <div class="product-card__footer">

                            <div class="product-card__price">
                                <span class="current">R$ 50,90</span>
                            </div>

                            <button class="btn btn--primary btn--sm">
                                Comprar
                            </button>

                        </div>

                    </div>

                </div>
                <!-- Produto 2 -->
                <div class="product-card">

                    <div class="product-card__image">

                        <img src="https://http2.mlstatic.com/D_NQ_NP_2X_917122-MLA107583344575_022026-F.webp" alt="Produto">

                        <div class="product-card__badges">
                            <span class="badge badge--sale">
                                -30%
                            </span>
                        </div>

                        <button class="product-card__wishlist">
                            ❤️
                        </button>

                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Incêndio
                        </div>

                        <h3 class="product-card__name">
                            Kit Botoeira De Bomba E Alarme
                        </h3>

                        <div class="rating">
                            <span class="rating__stars">★★★★☆</span>
                            <span class="rating__count">(129)</span>
                        </div>

                        <div class="product-card__footer">

                            <div class="product-card__price">
                                <span class="current">R$ 114,90</span>
                                <span class="original">R$ 140,90</span>
                            </div>

                            <button class="btn btn--primary btn--sm">
                                Comprar
                            </button>

                        </div>

                    </div>

                </div>
                <!-- Produto 3 -->
                <div class="product-card">

                    <div class="product-card__image">

                        <img src="https://http2.mlstatic.com/D_NQ_NP_2X_605400-MLA106720594962_022026-F.webp" alt="Produto">

                        <div class="product-card__badges">
                            <span class="badge badge--sale">
                                -30%
                            </span>
                        </div>

                        <button class="product-card__wishlist">
                            ❤️
                        </button>

                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Adaptadores

                        <h3 class="product-card__name">

                            <div class="product-card__price">
                                <span class="current">R$ 24,90</span>
                                <span class="original">R$ 38,90</span>
                            </div>

                            <button class="btn btn--primary btn--sm">
                                Comprar
                            </button>

                        </div>

                    </div>

                </div>

    
</body>
</html>
